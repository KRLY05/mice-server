services:
  vllm-server:
    build: .
    container_name: vllm-gemma-server
    profiles:
      - manual
    ports:
      - "8000:8000"
    ipc: host
    environment:
      - HF_TOKEN=${HF_TOKEN}
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    volumes:
      - ${PROJECT_ROOT:-.}/${HF_CACHE_PATH:-hf_cache}:/root/.cache/huggingface
    command: >
      --model google/gemma-4-12B-it-qat-w4a16-ct
      --max-model-len 32768
      --gpu-memory-utilization 0.90
      --enable-auto-tool-choice
      --tool-call-parser gemma4
    restart: unless-stopped

  diffusion-server:
    build:
      context: .
      dockerfile: Dockerfile.diffusion
    container_name: diffusion-server
    profiles:
      - manual
    ports:
      - "8188:8188"
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    volumes:
      - ${COMFYUI_MODELS_PATH:-./models}:/models
      - ${PROJECT_ROOT:-.}/extra_model_paths.yaml:/app/extra_model_paths.yaml
    environment:
      - CLI_ARGS=--extra-model-paths-config /app/extra_model_paths.yaml
    restart: unless-stopped

  telegram-bot:
    build:
      context: .
      dockerfile: Dockerfile.bot
    container_name: telegram-bot
    environment:
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}
      - PROJECT_ROOT=${PROJECT_ROOT}
      - COMFYUI_MODELS_PATH=${COMFYUI_MODELS_PATH}
      - DOCKER_SOCKET_PATH=${DOCKER_SOCKET_PATH}
      - HF_CACHE_PATH=${HF_CACHE_PATH}
    volumes:
      - ${DOCKER_SOCKET_PATH:-/var/run/docker.sock}:/var/run/docker.sock
      - ${PROJECT_ROOT:-.}:/app
    restart: unless-stopped
