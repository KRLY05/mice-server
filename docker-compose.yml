services:
  vllm-server:
    build: .
    container_name: vllm-gemma-server
    profiles:
      - manual
    ports:
      - "8000:8000"
    ipc: host
    environment:
      - HF_TOKEN=${HF_TOKEN}
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    volumes:
      - ./hf_cache:/root/.cache/huggingface
    command: >
      --model google/gemma-4-12B-it-qat-w4a16-ct
      --max-model-len 32768
      --gpu-memory-utilization 0.90
      --enable-auto-tool-choice
      --tool-call-parser gemma4
    restart: unless-stopped

  diffusion-server:
    image: yanwk/comfyui-boot:cu121
    container_name: diffusion-server
    profiles:
      - manual
    ports:
      - "8188:8188"
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    volumes:
      - /mnt/c/Users/krly/Programs/ComfyUI-files/models:/models
      - .:/app
    environment:
      - CLI_ARGS=--listen 0.0.0.0 --port 8188 --disable-auto-launch --extra-model-paths-yaml /app/extra_model_paths.yaml
    restart: unless-stopped

  telegram-bot:
    build:
      context: .
      dockerfile: Dockerfile.bot
    container_name: telegram-bot
    environment:
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - .:/app
    restart: unless-stopped
